<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mi Carrito | Amaranto</title>
  <link rel="stylesheet" href="/src/style.css">
  <style>
    .cart-page {
      padding: 80px 0;
      min-height: 70vh;
    }
    .cart-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 40px;
    }
    .cart-table th {
      text-align: left;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--border-light);
      text-transform: uppercase;
      font-size: 0.8rem;
      letter-spacing: 1px;
    }
    .cart-table td {
      padding: 30px 0;
      border-bottom: 1px solid var(--border-light);
    }
    .cart-item-info {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .cart-item-info img {
      width: 100px;
      height: 100px;
      object-fit: cover;
    }
    .qty-input {
      width: 60px;
      padding: 10px;
      border: 1px solid var(--border-light);
      text-align: center;
    }
    .cart-summary {
      margin-top: 60px;
      background-color: #FFF;
      padding: 40px;
      border: 1px solid var(--border-light);
      max-width: 400px;
      margin-left: auto;
    }
    .summary-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      font-size: 1.1rem;
    }
    .summary-total {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--accent-wine);
      border-top: 1px solid var(--border-light);
      padding-top: 20px;
    }
    @media (max-width: 768px) {
      .cart-table thead { display: none; }
      .cart-table tr { display: block; margin-bottom: 40px; border-bottom: 2px solid var(--accent-wine); }
      .cart-table td { display: block; padding: 10px 0; border: none; }
      .cart-summary { margin-left: 0; max-width: 100%; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container" style="display: flex; justify-content: space-between; align-items: center;">
      <a href="/" class="nav-brand">
        <img src="/assets/new_logo.png" alt="Amaranto Logo" class="nav-logo">
      </a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/tienda.html">Tienda</a></li>
        <li><a href="/corporativo.html">Corporativo</a></li>
        <li><a href="/nosotros.html">Sobre nosotros</a></li>
        <li><a href="/contacto.html">Contacto</a></li>
        <li class="nav-cart">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
          <span class="cart-count">0</span>
        </li>
      </ul>
    </div>
  </nav>

  <main class="container cart-page">
    <h1 style="font-family: 'Playfair Display', serif; font-size: 3rem;">Tu Carrito</h1>
    
    <div id="full-cart-content">
      <!-- Generated by JS -->
      <table class="cart-table">
        <thead>
          <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Cantidad</th>
            <th>Subtotal</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cart-table-body">
          <!-- Items here -->
        </tbody>
      </table>

      <div class="cart-summary">
        <div class="summary-row">
          <span>Subtotal:</span>
          <span class="total-amount">$ 0</span>
        </div>
        <div class="summary-row">
          <span>Envío:</span>
          <span>Calculado en checkout</span>
        </div>
        <div class="summary-row summary-total">
          <span>Total:</span>
          <span class="total-amount">$ 0</span>
        </div>
        <a href="/checkout.html" class="btn btn-primary" style="width: 100%; margin-top: 30px;">Finalizar Pedido</a>
      </div>
    </div>
  </main>

  <footer class="footer container">
    <div class="footer-bottom">
      &copy; 2026 Amaranto. Todos los derechos reservados.
    </div>
  </footer>

  <!-- Side Cart Drawer -->
  <div class="cart-overlay"></div>
  <div class="cart-drawer">
    <div class="cart-header">
      <h3 style="font-family: 'Playfair Display', serif;">Tu Carrito</h3>
      <button class="close-cart" style="background:none; border:none; font-size: 1.5rem; cursor:pointer;">&times;</button>
    </div>
    <div class="cart-items"></div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total:</span>
        <span class="total-amount">$ 0</span>
      </div>
      <a href="/carrito.html" class="btn btn-primary" style="width: 100%;">Finalizar Pedido</a>
    </div>
  </div>

  <script type="module">
    import { removeFromCart } from '/src/main.js';
    
    function renderFullCart() {
      const cart = JSON.parse(localStorage.getItem('amaranto_cart')) || [];
      const tbody = document.getElementById('cart-table-body');
      
      if (cart.length === 0) {
        document.getElementById('full-cart-content').innerHTML = '<p style="font-size: 1.2rem; margin-top: 40px;">Tu carrito está vacío. <a href="/tienda.html" style="color:var(--accent-wine)">Ir a la tienda</a></p>';
        return;
      }

      tbody.innerHTML = cart.map(item => `
        <tr>
          <td>
            <div class="cart-item-info">
              <img src="${item.image}" alt="${item.name}">
              <div>
                <h4 style="font-family: 'Playfair Display', serif;">${item.name}</h4>
              </div>
            </div>
          </td>
          <td>$ ${item.price}</td>
          <td>${item.quantity}</td>
          <td>$ ${(parseFloat(item.price.replace(/[$,]/g, '')) * item.quantity).toLocaleString()}</td>
          <td><button onclick="removeItem('${item.id}')" style="background:none; border:none; color:var(--accent-wine); cursor:pointer;">Quitar</button></td>
        </tr>
      `).join('');
    }

    window.removeItem = (id) => {
      removeFromCart(id);
      renderFullCart();
      window.location.reload(); // Refresh to update main.js UI as well
    };

    document.addEventListener('DOMContentLoaded', renderFullCart);
  </script>
  <script type="module" src="/src/main.js"></script>

</html>
