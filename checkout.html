<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | Amaranto</title>
  <link rel="stylesheet" href="/src/style.css">
  <style>
    .checkout-page {
      padding: 80px 0;
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 60px;
    }
    .checkout-form h2 {
      font-size: 2rem;
      margin-bottom: 30px;
      border-bottom: 1px solid var(--border-light);
      padding-bottom: 10px;
    }
    .form-section {
      margin-bottom: 40px;
    }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .form-group input {
      width: 100%;
      padding: 15px;
      border: 1px solid var(--border-light);
      background-color: var(--bg-cream);
    }
    .order-summary {
      background-color: #FFF;
      padding: 30px;
      border: 1px solid var(--border-light);
      height: fit-content;
    }
    .summary-item {
      display: flex;
      justify-content: space-between;
      margin-bottom: 15px;
      font-size: 0.9rem;
    }
    .summary-total {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border-light);
      font-size: 1.3rem;
      font-weight: 600;
    }
    @media (max-width: 992px) {
      .checkout-page {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="container">
      <a href="/" class="nav-brand">
        <img src="/assets/new_logo.png" alt="Amaranto Logo" class="nav-logo">
      </a>
    </div>
  </nav>

  <main class="container checkout-page">
    <div class="checkout-form">
      <div class="form-section">
        <h2>Detalles de Envío</h2>
        <form id="checkout-form" onsubmit="event.preventDefault(); alert('Pedido procesado con éxito. Gracias por comprar en Amaranto.'); localStorage.removeItem('amaranto_cart'); window.location.href='/';">
          <div class="form-grid">
            <div class="form-group">
              <label>Nombre</label>
              <input type="text" required>
            </div>
            <div class="form-group">
              <label>Apellidos</label>
              <input type="text" required>
            </div>
          </div>
          <div class="form-group">
            <label>Correo Electrónico</label>
            <input type="email" required>
          </div>
          <div class="form-group">
            <label>Dirección</label>
            <input type="text" required>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label>Ciudad</label>
              <input type="text" required>
            </div>
            <div class="form-group">
              <label>Código Postal</label>
              <input type="text" required>
            </div>
          </div>
          
          <h2 style="margin-top: 40px;">Método de Pago</h2>
          <div class="form-group">
            <label><input type="radio" name="payment" checked> Mercado Pago / Tarjeta</label>
          </div>
          <div class="form-group">
            <label><input type="radio" name="payment"> Transferencia Bancaria</label>
          </div>

          <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 30px; padding: 20px;">Pagar Ahora</button>
        </form>
      </div>
    </div>

    <div class="order-summary">
      <h3 style="font-family: 'Playfair Display', serif; margin-bottom: 20px;">Resumen del Pedido</h3>
      <div id="summary-items">
        <!-- JS -->
      </div>
      <div class="summary-total summary-item">
        <span>Total</span>
        <span class="total-amount">$ 0</span>
      </div>
    </div>
  </main>

  <script type="module">
    function renderSummary() {
      const cart = JSON.parse(localStorage.getItem('amaranto_cart')) || [];
      const container = document.getElementById('summary-items');
      const totalElements = document.querySelectorAll('.total-amount');

      if (cart.length === 0) {
        window.location.href = '/tienda.html';
        return;
      }

      container.innerHTML = cart.map(item => `
        <div class="summary-item">
          <span>${item.name} (x${item.quantity})</span>
          <span>$ ${(parseFloat(item.price.replace(/[$,]/g, '')) * item.quantity).toLocaleString()}</span>
        </div>
      `).join('');

      const total = cart.reduce((acc, item) => acc + (parseFloat(item.price.replace(/[$,]/g, '')) * item.quantity), 0);
      totalElements.forEach(el => el.textContent = `$ ${total.toLocaleString()}`);
    }

    document.addEventListener('DOMContentLoaded', renderSummary);
  </script>

</html>
